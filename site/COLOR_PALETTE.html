<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ampersand Color Palette</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #141414;
            color: #F0E6D3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #D4A123;
            font-family: Georgia, serif;
        }
        
        .subtitle {
            color: #8ED1FC;
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }
        
        .swatches {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        .swatch {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            padding: 1.5rem;
            background: #1E1E1E;
            border-radius: 8px;
        }
        
        .swatch-color {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .swatch-info h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .swatch-hex {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #8ED1FC;
            margin-bottom: 0.5rem;
        }
        
        .swatch-role {
            color: #D4A123;
            font-size: 0.95rem;
        }
        
        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(240, 230, 211, 0.2);
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.6;
        }
        
        @media print {
            body {
                background: white;
                color: #141414;
                padding: 1rem;
            }
            
            h1, .subtitle, .swatch-info h2 {
                color: #141414;
            }
            
            .swatch {
                background: #f5f5f5;
                page-break-inside: avoid;
            }
            
            .swatch-hex {
                color: #141414;
            }
            
            .swatch-role {
                color: #141414;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>&amp;</h1>
        <p class="subtitle">Ampersand Color Palette</p>
        
        <div class="swatches">
            <div class="swatch">
                <div class="swatch-color" style="background: #141414; border-color: #666;"></div>
                <div class="swatch-info">
                    <h2>Black</h2>
                    <div class="swatch-hex">#141414</div>
                    <div class="swatch-role">Background, ground</div>
                </div>
            </div>
            
            <div class="swatch">
                <div class="swatch-color" style="background: #D4A123;"></div>
                <div class="swatch-info">
                    <h2>Amber</h2>
                    <div class="swatch-hex">#D4A123</div>
                    <div class="swatch-role">Primary accent, warmth</div>
                </div>
            </div>
            
            <div class="swatch">
                <div class="swatch-color" style="background: #F0E6D3;"></div>
                <div class="swatch-info">
                    <h2>Cream</h2>
                    <div class="swatch-hex">#F0E6D3</div>
                    <div class="swatch-role">Text, highlights</div>
                </div>
            </div>
            
            <div class="swatch">
                <div class="swatch-color" style="background: #1E1E1E;"></div>
                <div class="swatch-info">
                    <h2>Ash</h2>
                    <div class="swatch-hex">#1E1E1E</div>
                    <div class="swatch-role">Card surface, depth</div>
                </div>
            </div>
            
            <div class="swatch">
                <div class="swatch-color" style="background: #8ED1FC;"></div>
                <div class="swatch-info">
                    <h2>Malibu</h2>
                    <div class="swatch-hex">#8ED1FC</div>
                    <div class="swatch-role">Secondary accent, breath</div>
                </div>
            </div>
        </div>
        
        <footer>
            Ampersand Strategic Palette — May 31, 2026
        </footer>
    </div>
</body>
</html>
