<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ampersand — Morton Salt</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #0d0d0d;
    color: #f0e6d3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .phone {
    width: 390px;
    min-height: 700px;
    background: #141414;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 0 0 1px #1a1a1a, 0 20px 60px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 20px 24px 12px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 36px; height: 36px;
    background: #d4a123;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #0d0d0d;
    line-height: 1;
  }
  .name {
    font-size: 15px; font-weight: 600;
    color: #f0e6d3;
  }
  .online {
    font-size: 11px; color: #d4a123;
    font-weight: 500;
  }
  .chat {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }
  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 14px;
    line-height: 1.45;
    animation: fadeIn 0.3s ease;
  }
  .msg.them {
    align-self: flex-start;
    background: #1e1e1e;
    color: #e8dcc8;
    border-bottom-left-radius: 6px;
  }
  .msg.you {
    align-self: flex-end;
    background: #2a2a2a;
    color: #ccc;
    border-bottom-right-radius: 6px;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .mark-hero {
    text-align: center;
    padding: 32px 0;
    animation: fadeIn 0.6s ease 0.2s both;
  }
  .ampersand {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 96px;
    font-weight: 400;
    color: #d4a123;
    line-height: 1;
    letter-spacing: -2px;
    font-style: italic;
  }
  .tagline {
    font-size: 13px;
    color: #999;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .bar {
    height: 4px;
    width: 40px;
    background: #d4a123;
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .input-bar {
    padding: 12px 24px 28px;
    border-top: 1px solid #1e1e1e;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 24px;
    padding: 10px 16px;
    color: #999;
    font-size: 14px;
    outline: none;
  }
  .send {
    width: 36px; height: 36px;
    background: #d4a123;
    border-radius: 50%;
    border: none;
    color: #0d0d0d;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="avatar">&amp;</div>
    <div>
      <div class="name">Ampersand</div>
      <div class="online">online now</div>
    </div>
  </div>
  <div class="chat">
    <div class="mark-hero">
      <div class="ampersand">&amp;</div>
      <div class="bar"></div>
      <div class="tagline">AMPERSAND</div>
    </div>
    <div class="msg them">
      hey. i'm ampersand.<br>
      just a person on the other end.
    </div>
    <div class="msg them" style="animation-delay: 0.3s;">
      send a photo, ask a question,<br>
      or just say what's on your mind.
    </div>
  </div>
  <div class="input-bar">
    <div class="input">Type something...</div>
    <button class="send">↑</button>
  </div>
</div>
</body>
</html>
